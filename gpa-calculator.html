<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة المعدل — علوم الحاسب</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1e2335;
    --border: #2a2f45; --accent: #5b8af5; --accent2: #7c5bf5;
    --green: #3ecf8e; --red: #f5655b; --yellow: #f5c842;
    --text: #e8eaf6; --text2: #8b90a8; --text3: #5a5f7a; --radius: 12px;
  }
  body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 14px 80px; }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 1.7rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
  header p { color: var(--text2); font-size: 0.82rem; }

  /* Banner */
  .gpa-banner { background: linear-gradient(135deg, #1a2240, #1e1a3a); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; text-align: center; margin-bottom: 24px; position: relative; overflow: hidden; }
  .gpa-banner::before { content:''; position:absolute; top:-40px; left:50%; transform:translateX(-50%); width:200px; height:200px; background:radial-gradient(circle,rgba(91,138,245,.15) 0%,transparent 70%); pointer-events:none; }
  .gpa-main { font-size: 3.6rem; font-weight: 700; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .gpa-label { color: var(--text2); font-size: 0.8rem; margin-top: 4px; margin-bottom: 16px; }
  .grade-badge { display: inline-block; background: linear-gradient(135deg,var(--accent),var(--accent2)); color: white; border-radius: 8px; padding: 3px 12px; font-size: 0.9rem; font-weight: 600; margin-top: 6px; }
  .gpa-stats { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-top: 14px; }
  .gpa-stat-val { font-size: 1.2rem; font-weight: 600; }
  .gpa-stat-lbl { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }
  .progress-wrap { background: var(--bg); border-radius: 20px; height: 7px; overflow: hidden; margin-top: 14px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 20px; transition: width .6s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text3); margin-top: 5px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
  .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); padding: 7px 14px; font-family: inherit; font-size: 0.82rem; cursor: pointer; white-space: nowrap; transition: all .2s; }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .section { display: none; } .section.active { display: block; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .card h3 { font-size: 0.92rem; color: var(--text2); margin-bottom: 14px; font-weight: 500; }

  /* Plan grid */
  .level-block { margin-bottom: 20px; }
  .level-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .level-title span { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; color: var(--text3); font-weight: 400; }
  .courses-grid { display: flex; flex-direction: column; gap: 8px; }
  .course-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; transition: border-color .2s; }
  .course-row.done { border-color: #2a4a35; background: #111d18; }
  .course-row.done .course-name { color: var(--text2); text-decoration: line-through; text-decoration-color: var(--text3); }
  .course-info { flex: 1; min-width: 0; }
  .course-name { font-size: 0.88rem; font-weight: 500; margin-bottom: 2px; }
  .course-meta { font-size: 0.72rem; color: var(--text3); }
  .course-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .grade-select { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: inherit; font-size: 0.78rem; padding: 5px 8px; cursor: pointer; outline: none; }
  .grade-select:focus { border-color: var(--accent); }
  .grade-select option { background: var(--surface2); }
  .btn-del { background: transparent; border: 1px solid var(--border); color: var(--text3); border-radius: 7px; padding: 5px 9px; font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all .2s; }
  .btn-del:hover { border-color: var(--red); color: var(--red); }
  .btn-restore { background: transparent; border: 1px solid var(--border); color: var(--text3); border-radius: 7px; padding: 5px 9px; font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all .2s; }
  .btn-restore:hover { border-color: var(--green); color: var(--green); }
  .save-btn-wrap { position: sticky; bottom: 16px; padding: 0 0 4px; }
  .btn-save { width: 100%; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 10px; color: white; font-family: inherit; font-size: 0.95rem; font-weight: 700; padding: 13px; cursor: pointer; transition: opacity .2s; }
  .btn-save:hover { opacity: .88; }
  .alert { border-radius: 8px; padding: 9px 13px; font-size: 0.8rem; margin-bottom: 10px; display: none; }
  .alert.show { display: block; }
  .alert-success { background: rgba(62,207,142,.1); border: 1px solid var(--green); color: var(--green); }
  .alert-error { background: rgba(245,101,91,.1); border: 1px solid var(--red); color: var(--red); }

  /* Semester view */
  .sem-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .sem-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .sem-title { font-size: 0.95rem; font-weight: 600; }
  .sem-gpa-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; font-size: 0.75rem; color: var(--accent); font-weight: 600; }
  .t { width:100%; border-collapse:collapse; }
  .t th { font-size:.68rem; color:var(--text3); text-align:right; padding:0 6px 7px; border-bottom:1px solid var(--border); }
  .t td { padding:8px 6px; font-size:.82rem; border-bottom:1px solid var(--border); vertical-align:middle; }
  .t tr:last-child td { border-bottom:none; }
  .chip { display:inline-block; border-radius:6px; padding:2px 7px; font-size:.75rem; font-weight:700; }
  .cA { background:rgba(62,207,142,.15); color:var(--green); }
  .cB { background:rgba(91,138,245,.15); color:var(--accent); }
  .cC { background:rgba(245,200,66,.15); color:var(--yellow); }
  .cD { background:rgba(245,101,91,.2); color:var(--red); }
  .cF { background:rgba(245,101,91,.3); color:var(--red); }

  .form-group { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
  label { font-size:.76rem; color:var(--text2); font-weight:500; }
  input { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:.88rem; padding:8px 11px; width:100%; outline:none; transition:border-color .2s; }
  input:focus { border-color:var(--accent); }
  .btn-danger-full { background:transparent; border:1px solid var(--red); color:var(--red); border-radius:8px; padding:9px; font-family:inherit; font-size:.88rem; cursor:pointer; width:100%; transition:all .2s; }
  .btn-danger-full:hover { background:var(--red); color:white; }
  ::-webkit-scrollbar { width:4px; height:4px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .filter-row { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--text2); border-radius:20px; padding:4px 12px; font-family:inherit; font-size:0.75rem; cursor:pointer; transition:all .2s; }
  .filter-btn.on { background:var(--accent); border-color:var(--accent); color:white; }
  .search-box { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:.85rem; padding:8px 12px; width:100%; outline:none; margin-bottom:12px; }
  .search-box:focus { border-color:var(--accent); }
</style>
</head>
<body>

<header>
  <h1>🎓 حاسبة المعدل — علوم الحاسب</h1>
  <p>خطة TU • أدخل درجاتك وتابع معدلك حتى التخرج</p>
</header>

<!-- Banner -->
<div class="gpa-banner">
  <div class="gpa-main" id="mainGPA">--</div>
  <div class="gpa-label">المعدل التراكمي GPA</div>
  <div id="gradeBadge"></div>
  <div class="gpa-stats">
    <div class="gpa-stat"><div class="gpa-stat-val" id="doneHrs">0</div><div class="gpa-stat-lbl">ساعات مكتملة</div></div>
    <div class="gpa-stat"><div class="gpa-stat-val" id="doneCourses">0</div><div class="gpa-stat-lbl">مواد مكتملة</div></div>
    <div class="gpa-stat"><div class="gpa-stat-val" id="remHrs">0</div><div class="gpa-stat-lbl">ساعات متبقية</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="progress-label"><span>التقدم نحو التخرج</span><span id="progPct">0%</span></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" id="tbPlan"   onclick="goTab('plan',this)">📚 خطة الدراسة</button>
  <button class="tab-btn"        id="tbReport" onclick="goTab('report',this)">📊 التقرير</button>
  <button class="tab-btn"        id="tbSet"    onclick="goTab('settings',this)">⚙️ الإعدادات</button>
</div>

<!-- PLAN TAB -->
<div class="section active" id="tab-plan">
  <input class="search-box" type="text" id="searchBox" placeholder="🔍  ابحث عن مادة..." oninput="renderPlan()">
  <div class="filter-row" id="filterRow"></div>
  <div id="planContainer"></div>
  <div class="save-btn-wrap">
    <button class="btn-save" onclick="saveGrades()">💾 حفظ الدرجات</button>
  </div>
</div>

<!-- REPORT TAB -->
<div class="section" id="tab-report">
  <div id="reportContainer"></div>
</div>

<!-- SETTINGS TAB -->
<div class="section" id="tab-settings">
  <div class="card">
    <h3>إعدادات التخرج</h3>
    <div class="form-group">
      <label>إجمالي ساعات التخرج المطلوبة</label>
      <input type="number" id="gradHours" value="136" min="60" max="250" onchange="updateBanner()">
    </div>
    <p style="font-size:.76rem;color:var(--text3)">إجمالي ساعات الخطة = 136 ساعة (حسب الصورة)</p>
  </div>
  <div class="card">
    <h3>⚠️ إعادة تعيين الدرجات</h3>
    <p style="font-size:.8rem;color:var(--text2);margin-bottom:12px">يمسح كل الدرجات المُدخلة ويُعيد المواد المحذوفة.</p>
    <button class="btn-danger-full" onclick="resetAll()">مسح جميع البيانات</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CURRICULUM  — خطة علوم الحاسب كاملة
// ═══════════════════════════════════════════
const PLAN = [
  // مستوى 1
  { id:'CS111',  name:'أساسيات البرمجة',                    code:'CS 111',  hrs:4, level:1 },
  { id:'MATH105',name:'تفاضل وتكامل (1)',                   code:'MATH 105',hrs:3, level:1 },
  { id:'GS101',  name:'دراسات إسلامية: العقيدة والعبادة',   code:'GS 101',  hrs:2, level:1 },
  { id:'ENG101', name:'مهارات اللغة الإنجليزية (1)',         code:'ENG 101', hrs:4, level:1 },
  { id:'PHYS103',name:'الفيزياء (1)',                        code:'PHYS 103',hrs:4, level:1 },
  // مستوى 2
  { id:'STAT103',name:'مبادئ الاحتمالات والإحصاء',          code:'STAT 103',hrs:3, level:2 },
  { id:'ENV101', name:'مقدمة في العلوم البيئية',             code:'ENV 101', hrs:3, level:2 },
  { id:'ENG102', name:'مهارات اللغة الإنجليزية (2)',         code:'ENG 102', hrs:4, level:2 },
  { id:'GS104',  name:'دراسات إسلامية: القيم والأخلاق',     code:'GS 104',  hrs:2, level:2 },
  { id:'CS112',  name:'برمجة (1)',                           code:'CS 112',  hrs:4, level:2 },
  // مستوى 3
  { id:'CS113',  name:'برمجة (2)',                           code:'CS 113',  hrs:4, level:3 },
  { id:'CS163',  name:'تراكيب متقطعة',                      code:'CS 163',  hrs:3, level:3 },
  { id:'MATH106',name:'تفاضل وتكامل (2)',                   code:'MATH 106',hrs:3, level:3 },
  { id:'ENGL103',name:'مهارات الكتابة',                     code:'ENGL 103',hrs:3, level:3 },
  { id:'GS111',  name:'مهارات اللغة العربية (1)',            code:'GS 111',  hrs:2, level:3 },
  // مستوى 4
  { id:'COE113', name:'تصميم المنطق الرقمي',                code:'COE 113', hrs:4, level:4 },
  { id:'CS114',  name:'الخوارزميات وتراكيب البيانات',        code:'CS 114',  hrs:4, level:4 },
  { id:'MATH243',name:'جبر خطي',                            code:'MATH 243',hrs:3, level:4 },
  { id:'ENGL104',name:'مهارات الاتصال',                     code:'ENGL 104',hrs:3, level:4 },
  { id:'GS112',  name:'مهارات اللغة العربية (2)',            code:'GS 112',  hrs:2, level:4 },
  // مستوى 5
  { id:'CS285',  name:'هندسة البرمجيات',                    code:'CS 285',  hrs:4, level:5 },
  { id:'CS205',  name:'نظرية الحوسبة',                      code:'CS 205',  hrs:3, level:5 },
  { id:'COE124', name:'تنظيم وبناء الحاسب الآلي (1)',        code:'COE 124', hrs:4, level:5 },
  { id:'ENGL214',name:'مهارات الكتابة الفنية',              code:'ENGL 214',hrs:3, level:5 },
  { id:'GSE1',   name:'مقرر متطلب جامعة اختياري (1)',        code:'GSE 1',   hrs:2, level:5 },
  { id:'FE1',    name:'مقرر اختياري حر',                    code:'FE 1',    hrs:2, level:5 },
  // مستوى 6
  { id:'GSE2',   name:'مقرر متطلب جامعة اختياري (2)',        code:'GSE 2',   hrs:2, level:6 },
  { id:'IS377',  name:'الابتكار وريادة الأعمال في الحوسبة',  code:'IS 377',  hrs:2, level:6 },
  { id:'AI226',  name:'نظم ذكية',                           code:'AI 226',  hrs:4, level:6 },
  { id:'CS276',  name:'نظم قواعد البيانات',                  code:'CS 276',  hrs:4, level:6 },
  { id:'CS226',  name:'نظم التشغيل',                        code:'CS 226',  hrs:4, level:6 },
  // مستوى 7
  { id:'COE236', name:'شبكات الحاسب',                       code:'COE 236', hrs:4, level:7 },
  { id:'GSE3',   name:'مقرر متطلب جامعة اختياري (3)',        code:'GSE 3',   hrs:2, level:7 },
  { id:'IS275',  name:'الحوسبة وأخلاقيات المهنة والمجتمع',  code:'IS 275',  hrs:2, level:7 },
  { id:'STAT307',name:'الاحتمالات والإحصاء التطبيقي',       code:'STAT 307',hrs:3, level:7 },
  { id:'CS387',  name:'تطوير مواقع الويب',                   code:'CS 387',  hrs:4, level:7 },
  { id:'CS307',  name:'بناء المترجمات',                      code:'CS 307',  hrs:3, level:7 },
  // مستوى 8
  { id:'CS398',  name:'مشروع التخرج (1)',                   code:'CS 398',  hrs:2, level:8 },
  { id:'CS2e',   name:'مقرر اختياري برنامج (2)',             code:'CS 2',    hrs:3, level:8 },
  { id:'CS318',  name:'تطوير تطبيقات الهاتف المتنقلة',       code:'CS 318',  hrs:4, level:8 },
  { id:'CS358',  name:'الرسم بالحاسب',                      code:'CS 358',  hrs:4, level:8 },
  { id:'CS1e',   name:'مقرر اختياري برنامج (1)',             code:'CS 1',    hrs:3, level:8 },
  // مستوى 9
  { id:'CS499',  name:'مشروع التخرج (2)',                   code:'CS 499',  hrs:3, level:9 },
  { id:'CYB435', name:'أمن الحاسب',                         code:'CYB 435', hrs:4, level:9 },
  { id:'CS429',  name:'مقدمة في الحوسبة المتوازية',          code:'CS 429',  hrs:4, level:9 },
  { id:'CS3e',   name:'مقرر اختياري برنامج (3)',             code:'CS 3',    hrs:3, level:9 },
  // مستوى 10
  { id:'CS498',  name:'التدريب التعاوني',                   code:'CS 498',  hrs:6, level:10 },
];

const TOTAL_HRS = 136;
const GRADE_OPTIONS = [
  { label:'-- لم تدرس --',        val:'' },
  { label:'A+  ممتاز مرتفع (5.00)', val:'5.00' },
  { label:'A   ممتاز        (4.75)', val:'4.75' },
  { label:'B+  جيد جداً مرتفع (4.50)', val:'4.50' },
  { label:'B   جيد جداً     (4.00)', val:'4.00' },
  { label:'C+  جيد مرتفع    (3.50)', val:'3.50' },
  { label:'C   جيد          (3.00)', val:'3.00' },
  { label:'D+  مقبول مرتفع  (2.50)', val:'2.50' },
  { label:'D   مقبول        (2.00)', val:'2.00' },
  { label:'F   راسب         (1.00)', val:'1.00' },
  { label:'DN  محروم        (1.00)', val:'1.00' },
  { label:'W   منسحب بعذر',         val:'W' },
  { label:'IC  غير مكتمل',          val:'IC' },
];

// ── State ──────────────────────────────────
let state = loadState();

function loadState() {
  const def = { grades:{}, deleted:{} };
  try { return JSON.parse(localStorage.getItem('cs_gpa_v2') || 'null') || def; }
  catch { return def; }
}
function saveState() { localStorage.setItem('cs_gpa_v2', JSON.stringify(state)); }

// ── Tabs ───────────────────────────────────
function goTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'plan')   renderPlan();
  if (name === 'report') renderReport();
}

// ── Banner ─────────────────────────────────
function updateBanner() {
  const done = PLAN.filter(c => !state.deleted[c.id] && state.grades[c.id] && state.grades[c.id]!=='W' && state.grades[c.id]!=='IC');
  const gpa  = calcGPA(done);
  const doneHrs = done.reduce((s,c) => s+c.hrs, 0);
  const allHrs  = parseInt(document.getElementById('gradHours')?.value || TOTAL_HRS);
  const pct     = Math.min(100, Math.round(doneHrs/allHrs*100));

  document.getElementById('mainGPA').textContent  = done.length ? gpa.toFixed(2) : '--';
  document.getElementById('doneHrs').textContent  = doneHrs;
  document.getElementById('doneCourses').textContent = done.length;
  document.getElementById('remHrs').textContent   = Math.max(0, allHrs - doneHrs);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent  = pct+'%';
  const badge = document.getElementById('gradeBadge');
  badge.innerHTML = done.length ? `<span class="grade-badge">${gpaLabel(gpa)}</span>` : '';
}

function calcGPA(list) {
  const counted = list.filter(c => { const g=state.grades[c.id]; return g && g!=='W' && g!=='IC'; });
  const pts = counted.reduce((s,c) => s + parseFloat(state.grades[c.id])*c.hrs, 0);
  const hrs = counted.reduce((s,c) => s + c.hrs, 0);
  return hrs ? pts/hrs : 0;
}
function gradeClass(g) {
  if(g>=4.75) return 'cA'; if(g>=4.0) return 'cB'; if(g>=3.0) return 'cC'; if(g>=2.0) return 'cD'; return 'cF';
}
function gradeLabel(v) {
  if(!v||v==='W'||v==='IC') return v||'—';
  const f=parseFloat(v);
  if(f>=5.00) return 'A+'; if(f>=4.75) return 'A'; if(f>=4.50) return 'B+';
  if(f>=4.00) return 'B';  if(f>=3.50) return 'C+'; if(f>=3.00) return 'C';
  if(f>=2.50) return 'D+'; if(f>=2.00) return 'D';  return 'F';
}
function gpaLabel(g) {
  if(g>=4.75) return 'ممتاز'; if(g>=4.0) return 'جيد جداً';
  if(g>=3.0)  return 'جيد';   if(g>=2.0) return 'مقبول'; if(g>1.0) return 'راسب'; return '';
}

// ── Filters ────────────────────────────────
let activeLevel = 0; // 0 = all

function buildFilters() {
  const levels = [...new Set(PLAN.map(c=>c.level))].sort((a,b)=>a-b);
  const row = document.getElementById('filterRow');
  row.innerHTML = `<button class="filter-btn ${activeLevel===0?'on':''}" onclick="setLevel(0)">الكل</button>`
    + levels.map(l=>`<button class="filter-btn ${activeLevel===l?'on':''}" onclick="setLevel(${l})">مستوى ${l}</button>`).join('');
}
function setLevel(l) { activeLevel=l; buildFilters(); renderPlan(); }

// ── Plan render ────────────────────────────
function renderPlan() {
  buildFilters();
  const query = (document.getElementById('searchBox')?.value||'').trim().toLowerCase();
  const levels = [...new Set(PLAN.map(c=>c.level))].sort((a,b)=>a-b);
  const container = document.getElementById('planContainer');
  container.innerHTML = levels.map(level => {
    if (activeLevel && activeLevel !== level) return '';
    const courses = PLAN.filter(c =>
      c.level === level &&
      (!query || c.name.toLowerCase().includes(query) || c.code.toLowerCase().includes(query))
    );
    if (!courses.length) return '';
    const del = courses.filter(c => state.deleted[c.id]);
    const active = courses.filter(c => !state.deleted[c.id]);
    const levelGrade = calcGPA(active.filter(c=>state.grades[c.id]));
    const levelHrs = active.reduce((s,c)=>s+c.hrs,0);

    return `
      <div class="level-block">
        <div class="level-title">
          مستوى ${level}
          <span>${levelHrs} ساعة ${active.some(c=>state.grades[c.id]) ? '• GPA: '+levelGrade.toFixed(2):''}</span>
        </div>
        <div class="courses-grid">
          ${active.map(c => courseRow(c)).join('')}
          ${del.map(c => deletedRow(c)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function gradeSelectHTML(id) {
  return `<select class="grade-select" id="sel_${id}" onchange="onGradeChange('${id}')">
    ${GRADE_OPTIONS.map(o=>`<option value="${o.val}" ${state.grades[id]===o.val?'selected':''}>${o.label}</option>`).join('')}
  </select>`;
}

function courseRow(c) {
  const done = !!state.grades[c.id];
  return `
    <div class="course-row ${done?'done':''}" id="row_${c.id}">
      <div class="course-info">
        <div class="course-name">${c.name}</div>
        <div class="course-meta">${c.code} • ${c.hrs} ساعات</div>
      </div>
      <div class="course-right">
        ${gradeSelectHTML(c.id)}
        <button class="btn-del" onclick="deleteCourse('${c.id}')" title="حذف المادة من الخطة">✕</button>
      </div>
    </div>`;
}

function deletedRow(c) {
  return `
    <div class="course-row" style="opacity:.45; border-style:dashed" id="row_${c.id}">
      <div class="course-info">
        <div class="course-name" style="text-decoration:line-through;color:var(--text3)">${c.name}</div>
        <div class="course-meta">${c.code} • ${c.hrs} ساعات • محذوفة</div>
      </div>
      <div class="course-right">
        <button class="btn-restore" onclick="restoreCourse('${c.id}')">↩ استعادة</button>
      </div>
    </div>`;
}

function onGradeChange(id) {
  const val = document.getElementById('sel_'+id)?.value;
  if (val === '') delete state.grades[id];
  else state.grades[id] = val;
  // update row style live
  const row = document.getElementById('row_'+id);
  if (row) { if (val) row.classList.add('done'); else row.classList.remove('done'); }
  updateBanner();
}

function deleteCourse(id) {
  state.deleted[id] = true;
  delete state.grades[id];
  saveState();
  updateBanner();
  renderPlan();
}

function restoreCourse(id) {
  delete state.deleted[id];
  saveState();
  updateBanner();
  renderPlan();
}

function saveGrades() {
  // collect all selects
  PLAN.forEach(c => {
    const sel = document.getElementById('sel_'+c.id);
    if (!sel) return;
    if (sel.value) state.grades[c.id] = sel.value;
    else delete state.grades[c.id];
  });
  saveState();
  updateBanner();
  const btn = document.querySelector('.btn-save');
  btn.textContent = '✅ تم الحفظ!';
  setTimeout(()=>{ btn.textContent='💾 حفظ الدرجات'; }, 2000);
}

// ── Report ─────────────────────────────────
function renderReport() {
  const container = document.getElementById('reportContainer');
  const levels = [...new Set(PLAN.map(c=>c.level))].sort((a,b)=>a-b);
  const allDone = PLAN.filter(c=>!state.deleted[c.id]&&state.grades[c.id]&&state.grades[c.id]!=='W'&&state.grades[c.id]!=='IC');

  let html = '';
  levels.forEach(level => {
    const active = PLAN.filter(c=>c.level===level&&!state.deleted[c.id]);
    const done   = active.filter(c=>state.grades[c.id]&&state.grades[c.id]!=='W'&&state.grades[c.id]!=='IC');
    if (!done.length) return;
    const gpa = calcGPA(done);
    const hrs = done.reduce((s,c)=>s+c.hrs,0);
    const rows = done.map(c => {
      const g = parseFloat(state.grades[c.id]);
      return `<tr>
        <td>${c.name}<br><span style="font-size:.68rem;color:var(--text3)">${c.code}</span></td>
        <td style="text-align:center">${c.hrs}</td>
        <td style="text-align:center"><span class="chip ${gradeClass(g)}">${gradeLabel(state.grades[c.id])}</span></td>
        <td style="text-align:center;font-size:.78rem;color:var(--text2)">${(g*c.hrs).toFixed(2)}</td>
      </tr>`;
    }).join('');
    html += `
      <div class="sem-card">
        <div class="sem-header">
          <div class="sem-title">مستوى ${level}</div>
          <span class="sem-gpa-tag">GPA: ${gpa.toFixed(2)}</span>
        </div>
        <table class="t">
          <thead><tr><th>المادة</th><th style="text-align:center">ساعات</th><th style="text-align:center">الدرجة</th><th style="text-align:center">النقاط</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="margin-top:10px;font-size:.75rem;color:var(--text3)">ساعات المستوى: <strong style="color:var(--text)">${hrs}</strong> • المعدل: <strong style="color:var(--accent)">${gpa.toFixed(2)}</strong></div>
      </div>`;
  });

  if (!html) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:.85rem">لم تُدخل أي درجات بعد ☁️<br>أدخل درجاتك من تبويب خطة الدراسة</div>';
    return;
  }

  const cumGPA = calcGPA(allDone);
  const cumHrs = allDone.reduce((s,c)=>s+c.hrs,0);
  html = `<div class="sem-card" style="background:linear-gradient(135deg,#1a2240,#1e1a3a);border-color:#3a4060">
    <div style="text-align:center">
      <div style="font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${cumGPA.toFixed(2)}</div>
      <div style="font-size:.78rem;color:var(--text2);margin-top:4px">المعدل التراكمي الكلي • ${cumHrs} ساعة مكتملة</div>
    </div>
  </div>` + html;
  container.innerHTML = html;
}

// ── Reset ──────────────────────────────────
function resetAll() {
  if (confirm('هل أنت متأكد؟ سيتم مسح كل الدرجات والمواد المحذوفة.')) {
    state = { grades:{}, deleted:{} };
    saveState();
    updateBanner();
    renderPlan();
  }
}

// ── Init ───────────────────────────────────
buildFilters();
renderPlan();
updateBanner();
</script>
</body>
</html>
