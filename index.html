<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة المعدل — جامعة طيبة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1e2335;
    --border: #2a2f45; --accent: #5b8af5; --accent2: #7c5bf5;
    --green: #3ecf8e; --red: #f5655b; --yellow: #f5c842;
    --text: #e8eaf6; --text2: #8b90a8; --text3: #5a5f7a; --radius: 12px;
  }
  body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -50%; right: -20%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(91,138,245,0.08) 0%, transparent 65%); pointer-events: none; z-index: 0; animation: drift 20s ease-in-out infinite; }

  /* ── Specialty Picker ── */
  #specialtyScreen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; position: relative; z-index: 1; }
  #specialtyScreen h1 { font-size: 2rem; font-weight: 700; text-align: center; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
  #specialtyScreen p { color: var(--text2); font-size: 0.85rem; text-align: center; margin-bottom: 32px; }
  .specialty-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; width: 100%; max-width: 600px; }
  .spec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all .22s; text-align: center; }
  .spec-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(91,138,245,0.2); }
  .spec-card .spec-icon { font-size: 2rem; margin-bottom: 8px; }
  .spec-card .spec-name { font-size: 0.82rem; font-weight: 600; color: var(--text); line-height: 1.3; }
  .spec-card .spec-hrs { font-size: 0.68rem; color: var(--text3); margin-top: 4px; }

  /* ── Main App ── */
  #appScreen { display: none; padding: 20px 14px 90px; max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 2px; }
  header p { color: var(--text2); font-size: 0.78rem; }
  .change-spec-btn { display: inline-block; margin-top: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 20px; padding: 4px 13px; font-size: 0.72rem; cursor: pointer; font-family: inherit; transition: all .2s; }
  .change-spec-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Banner */
  .gpa-banner { background: linear-gradient(135deg, #1a1f3a 0%, #17152d 100%); border: 1px solid var(--border); border-radius: 18px; padding: 22px 18px; text-align: center; margin-bottom: 22px; position: relative; overflow: hidden; }
  .gpa-banner::before { content: ''; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 180px; height: 180px; background: radial-gradient(circle, rgba(91,138,245,.12) 0%, transparent 70%); pointer-events: none; }
  .gpa-main { font-size: 3.2rem; font-weight: 700; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .gpa-label { color: var(--text2); font-size: 0.78rem; margin-top: 4px; margin-bottom: 14px; }
  .grade-badge { display: inline-block; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border-radius: 8px; padding: 3px 11px; font-size: 0.88rem; font-weight: 600; margin-top: 6px; }
  .gpa-stats { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
  .gpa-stat { text-align: center; }
  .gpa-stat-val { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
  .gpa-stat-lbl { font-size: 0.68rem; color: var(--text3); margin-top: 1px; }
  .progress-wrap { background: rgba(255,255,255,0.03); border-radius: 20px; height: 6px; overflow: hidden; margin-top: 12px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 20px; transition: width .6s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text3); margin-top: 5px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); padding: 7px 14px; font-family: inherit; font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0; }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .section { display: none; }
  .section.active { display: block; }

  /* Plan */
  .level-block { margin-bottom: 18px; }
  .level-title { font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .level-title span { background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; padding: 2px 9px; font-size: 0.7rem; color: var(--text3); font-weight: 400; }
  .courses-grid { display: flex; flex-direction: column; gap: 7px; }
  .course-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; display: flex; align-items: center; gap: 9px; transition: border-color .2s; }
  .course-row.done { border-color: #2a4035; background: #0d1811; }
  .course-row.done .course-name { color: var(--text2); text-decoration: line-through; text-decoration-color: var(--text3); }
  .course-info { flex: 1; min-width: 0; }
  .course-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 1px; }
  .course-meta { font-size: 0.7rem; color: var(--text3); }
  .course-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .grade-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.75rem; padding: 4px 7px; cursor: pointer; outline: none; }
  .grade-select:focus { border-color: var(--accent); }
  .grade-select option { background: var(--surface2); }
  .btn-del { background: transparent; border: 1px solid var(--border); color: var(--text3); border-radius: 6px; padding: 4px 8px; font-family: inherit; font-size: 0.72rem; cursor: pointer; transition: all .2s; }
  .btn-del:hover { border-color: var(--red); color: var(--red); }
  .btn-restore { background: transparent; border: 1px solid var(--border); color: var(--text3); border-radius: 6px; padding: 4px 8px; font-family: inherit; font-size: 0.72rem; cursor: pointer; transition: all .2s; }
  .btn-restore:hover { border-color: var(--green); color: var(--green); }
  .save-btn-wrap { position: sticky; bottom: 16px; padding: 0; }
  .btn-save { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 9px; color: white; font-family: inherit; font-size: 0.92rem; font-weight: 700; padding: 12px; cursor: pointer; transition: opacity .2s; box-shadow: 0 4px 15px rgba(91,138,245,0.3); }
  .btn-save:hover { opacity: 0.9; }

  /* Report */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .sem-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .sem-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sem-title { font-size: 0.92rem; font-weight: 600; }
  .sem-gpa-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; padding: 3px 10px; font-size: 0.72rem; color: var(--accent); font-weight: 600; }
  .t { width: 100%; border-collapse: collapse; }
  .t th { font-size: 0.66rem; color: var(--text3); text-align: right; padding: 0 6px 6px; border-bottom: 1px solid var(--border); }
  .t td { padding: 6px; font-size: 0.8rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .t tr:last-child td { border-bottom: none; }
  .chip { display: inline-block; border-radius: 5px; padding: 1px 6px; font-size: 0.7rem; font-weight: 700; }
  .cA { background: rgba(62,207,142,0.15); color: var(--green); }
  .cB { background: rgba(91,138,245,0.15); color: var(--accent); }
  .cC { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .cD { background: rgba(245,101,91,0.15); color: var(--red); }
  .cF { background: rgba(245,101,91,0.2); color: var(--red); }

  /* Settings */
  .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 11px; }
  label { font-size: 0.74rem; color: var(--text2); font-weight: 500; }
  input { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: inherit; font-size: 0.85rem; padding: 7px 10px; width: 100%; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--accent); }
  .btn-danger-full { background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: 7px; padding: 8px; font-family: inherit; font-size: 0.85rem; cursor: pointer; width: 100%; transition: all .2s; font-weight: 600; }
  .btn-danger-full:hover { background: var(--red); color: white; }

  /* Misc */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 18px; padding: 4px 11px; font-family: inherit; font-size: 0.72rem; cursor: pointer; transition: all .2s; }
  .filter-btn.on { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.83rem; padding: 8px 11px; width: 100%; outline: none; margin-bottom: 11px; }
  .search-box:focus { border-color: var(--accent); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 0.82rem; line-height: 1.6; }
  .empty-state .empty-icon { font-size: 2rem; display: block; margin-bottom: 8px; opacity: 0.5; }
  .card h3 { font-size: 0.82rem; color: var(--text2); margin-bottom: 12px; font-weight: 500; }
</style>
</head>

const GRADE_OPTIONS = [
  { label:'-- لم تدرس --',      val:'' },
  { label:'A+  (5.00)',         val:'5.00' },
  { label:'A   (4.75)',         val:'4.75' },
  { label:'B+  (4.50)',         val:'4.50' },
  { label:'B   (4.00)',         val:'4.00' },
  { label:'C+  (3.50)',         val:'3.50' },
  { label:'C   (3.00)',         val:'3.00' },
  { label:'D+  (2.50)',         val:'2.50' },
  { label:'D   (2.00)',         val:'2.00' },
  { label:'F   (1.00)',         val:'1.00' },
];

// ════════════════════════════════════════════════════════════════
//  STATE & INITIALIZATION
// ════════════════════════════════════════════════════════════════

let currentSpecialty = null;
let state = { grades:{}, deleted:{} };
let activeLevel = 0;

function loadState(spec) {
  try {
    return JSON.parse(localStorage.getItem('tu_gpa_' + spec)) || { grades:{}, deleted:{} };
  } catch {
    return { grades:{}, deleted:{} };
  }
}

function saveState() {
  if (!currentSpecialty) return;
  localStorage.setItem('tu_gpa_' + currentSpecialty, JSON.stringify(state));
}

function initSpecialties() {
  const grid = document.getElementById('specGrid');
  grid.innerHTML = Object.entries(SPECIALTIES).map(([id, spec]) => `
    <div class="spec-card" onclick="chooseSpecialty('${id}')">
      <div class="spec-icon">${spec.icon}</div>
      <div class="spec-name">${spec.name}</div>
      <div class="spec-hrs">${spec.totalHrs} ساعة</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════════════════════════
//  MAIN FUNCTIONS
// ════════════════════════════════════════════════════════════════

function chooseSpecialty(key) {
  currentSpecialty = key;
  state = loadState(key);
  activeLevel = 0;
  const spec = SPECIALTIES[key];
  document.getElementById('appTitle').textContent = spec.icon + ' ' + spec.name;
  document.getElementById('appSubtitle').textContent = 'جامعة طيبة • ' + spec.totalHrs + ' ساعة';
  document.getElementById('gradHours').value = spec.totalHrs;
  document.getElementById('specialtyScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  buildFilters();
  renderPlan();
  updateBanner();
}

function showSpecialtyScreen() {
  document.getElementById('specialtyScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  currentSpecialty = null;
  activeLevel = 0;
}

function goTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'plan') renderPlan();
  if (name === 'report') renderReport();
}

function updateBanner() {
  const PLAN = SPECIALTIES[currentSpecialty]?.plan || [];
  const done = PLAN.filter(c => !state.deleted[c.id] && state.grades[c.id]);
  const gpa = calcGPA(done);
  const doneHrs = done.reduce((s, c) => s + c.hrs, 0);
  const allHrs = parseInt(document.getElementById('gradHours')?.value || 136);
  const pct = Math.min(100, Math.round(doneHrs / allHrs * 100));
  
  document.getElementById('mainGPA').textContent = done.length ? gpa.toFixed(2) : '--';
  document.getElementById('doneHrs').textContent = doneHrs;
  document.getElementById('doneCourses').textContent = done.length;
  document.getElementById('remHrs').textContent = Math.max(0, allHrs - doneHrs);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  
  const badge = document.getElementById('gradeBadge');
  badge.innerHTML = done.length ? `<div class="grade-badge">${gpaLabel(gpa)}</div>` : '';
}

function calcGPA(list) {
  const counted = list.filter(c => state.grades[c.id]);
  const pts = counted.reduce((s, c) => s + parseFloat(state.grades[c.id]) * c.hrs, 0);
  const hrs = counted.reduce((s, c) => s + c.hrs, 0);
  return hrs ? pts / hrs : 0;
}

function gpaLabel(g) {
  if (g >= 4.75) return 'ممتاز';
  if (g >= 4.0) return 'جيد جداً';
  if (g >= 3.0) return 'جيد';
  if (g >= 2.0) return 'مقبول';
  return 'راسب';
}

function buildFilters() {
  const PLAN = SPECIALTIES[currentSpecialty]?.plan || [];
  const levels = [...new Set(PLAN.map(c => c.level))].sort((a, b) => a - b);
  const row = document.getElementById('filterRow');
  row.innerHTML = `<button class="filter-btn ${activeLevel === 0 ? 'on' : ''}" onclick="setLevel(0)">الكل</button>` +
    levels.map(l => `<button class="filter-btn ${activeLevel === l ? 'on' : ''}" onclick="setLevel(${l})">المستوى ${l}</button>`).join('');
}

function setLevel(l) {
  activeLevel = l;
  buildFilters();
  renderPlan();
}

function renderPlan() {
  const PLAN = SPECIALTIES[currentSpecialty]?.plan || [];
  const query = (document.getElementById('searchBox')?.value || '').toLowerCase();
  const levels = [...new Set(PLAN.map(c => c.level))].sort((a, b) => a - b);
  const container = document.getElementById('planContainer');
  
  let html = '';
  levels.forEach(level => {
    if (activeLevel && activeLevel !== level) return;
    const courses = PLAN.filter(c =>
      c.level === level &&
      (!query || c.name.toLowerCase().includes(query) || c.code.toLowerCase().includes(query))
    );
    if (!courses.length) return;
    
    const active = courses.filter(c => !state.deleted[c.id]);
    const del = courses.filter(c => state.deleted[c.id]);
    const levelGrade = calcGPA(active.filter(c => state.grades[c.id]));
    const levelHrs = active.reduce((s, c) => s + c.hrs, 0);
    
    html += `
      <div class="level-block">
        <div class="level-title">
          المستوى ${level}
          <span>${levelHrs} ساعة${active.some(c => state.grades[c.id]) ? ' • GPA: ' + levelGrade.toFixed(2) : ''}</span>
        </div>
        <div class="courses-grid">
          ${active.map(c => courseRow(c)).join('')}
          ${del.map(c => deletedRow(c)).join('')}
        </div>
      </div>`;
  });
  
  if (!html) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div>لا توجد مواد تطابق البحث</div>';
  } else {
    container.innerHTML = html;
  }
}

function courseRow(c) {
  const done = !!state.grades[c.id];
  return `
    <div class="course-row ${done ? 'done' : ''}" id="row_${c.id}">
      <div class="course-info">
        <div class="course-name">${c.name}</div>
        <div class="course-meta">${c.code} • ${c.hrs} ساعات</div>
      </div>
      <div class="course-right">
        <select class="grade-select" id="sel_${c.id}" onchange="onGradeChange('${c.id}')">
          ${GRADE_OPTIONS.map(o => `<option value="${o.val}" ${state.grades[c.id] === o.val ? 'selected' : ''}>${o.label}</option>`).join('')}
        </select>
        <button class="btn-del" onclick="deleteCourse('${c.id}')" title="حذف">✕</button>
      </div>
    </div>`;
}

function deletedRow(c) {
  return `
    <div class="course-row" style="opacity:.4; border-style:dashed" id="row_${c.id}">
      <div class="course-info">
        <div class="course-name" style="text-decoration:line-through;color:var(--text3)">${c.name}</div>
        <div class="course-meta">${c.code} • ${c.hrs} ساعات • محذوفة</div>
      </div>
      <div class="course-right">
        <button class="btn-restore" onclick="restoreCourse('${c.id}')">↩ استعادة</button>
      </div>
    </div>`;
}

function onGradeChange(id) {
  const val = document.getElementById('sel_' + id)?.value;
  if (val === '') delete state.grades[id];
  else state.grades[id] = val;
  const row = document.getElementById('row_' + id);
  if (row) {
    if (val) row.classList.add('done');
    else row.classList.remove('done');
  }
  updateBanner();
}

function deleteCourse(id) {
  state.deleted[id] = true;
  delete state.grades[id];
  saveState();
  updateBanner();
  renderPlan();
}

function restoreCourse(id) {
  delete state.deleted[id];
  saveState();
  updateBanner();
  renderPlan();
}

function saveGrades() {
  const PLAN = SPECIALTIES[currentSpecialty]?.plan || [];
  PLAN.forEach(c => {
    const sel = document.getElementById('sel_' + c.id);
    if (!sel) return;
    if (sel.value) state.grades[c.id] = sel.value;
    else delete state.grades[c.id];
  });
  saveState();
  updateBanner();
  const btn = document.querySelector('.btn-save');
  btn.textContent = '✅ تم الحفظ!';
  setTimeout(() => {
    btn.textContent = '💾 حفظ الدرجات';
  }, 2000);
}

function renderReport() {
  const PLAN = SPECIALTIES[currentSpecialty]?.plan || [];
  const container = document.getElementById('reportContainer');
  const levels = [...new Set(PLAN.map(c => c.level))].sort((a, b) => a - b);
  const allDone = PLAN.filter(c => !state.deleted[c.id] && state.grades[c.id]);
  
  if (!allDone.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>لم تُدخل أي درجات بعد</div>';
    return;
  }
  
  let html = '';
  const cumGPA = calcGPA(allDone);
  const cumHrs = allDone.reduce((s, c) => s + c.hrs, 0);
  
  html += `
    <div class="sem-card" style="background:linear-gradient(135deg,#1a1f3a,#17152d);border-color:#2a2f45">
      <div style="text-align:center">
        <div style="font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${cumGPA.toFixed(2)}</div>
        <div style="font-size:0.76rem;color:var(--text2);margin-top:4px">المعدل التراكمي • ${cumHrs} ساعة مكتملة</div>
      </div>
    </div>`;
  
  levels.forEach(level => {
    const active = PLAN.filter(c => c.level === level && !state.deleted[c.id]);
    const done = active.filter(c => state.grades[c.id]);
    if (!done.length) return;
    
    const levelGPA = calcGPA(done);
    const levelHrs = done.reduce((s, c) => s + c.hrs, 0);
    const rows = done.map(c => {
      const g = parseFloat(state.grades[c.id]);
      const gradeStr = g >= 5.0 ? 'A+' : g >= 4.75 ? 'A' : g >= 4.5 ? 'B+' : g >= 4.0 ? 'B' :
                       g >= 3.5 ? 'C+' : g >= 3.0 ? 'C' : g >= 2.5 ? 'D+' : g >= 2.0 ? 'D' : 'F';
      const chipClass = g >= 4.75 ? 'cA' : g >= 4.0 ? 'cB' : g >= 3.0 ? 'cC' : g >= 2.0 ? 'cD' : 'cF';
      return `<tr>
        <td>${c.name}<br><span style="font-size:0.66rem;color:var(--text3)">${c.code}</span></td>
        <td style="text-align:center">${c.hrs}</td>
        <td style="text-align:center"><span class="chip ${chipClass}">${gradeStr}</span></td>
        <td style="text-align:center;font-size:0.76rem;color:var(--text2)">${(g * c.hrs).toFixed(2)}</td>
      </tr>`;
    }).join('');
    
    html += `
      <div class="sem-card">
        <div class="sem-header">
          <div class="sem-title">المستوى ${level}</div>
          <span class="sem-gpa-tag">GPA: ${levelGPA.toFixed(2)}</span>
        </div>
        <table class="t">
          <thead><tr><th>المادة</th><th style="text-align:center">ساعات</th><th style="text-align:center">الدرجة</th><th style="text-align:center">النقاط</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });
  
  container.innerHTML = html;
}

function resetAll() {
  if (confirm('هل أنت متأكد؟ سيتم مسح كل الدرجات والمواد المحذوفة.')) {
    state = { grades:{}, deleted:{} };
    saveState();
    updateBanner();
    renderPlan();
  }
}

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', initSpecialties);
</script>
