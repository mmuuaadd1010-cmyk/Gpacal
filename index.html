// ── GPA CALC ──────────────────────────────────────────
function getHrs(c) {
  if (state.customHrs && state.customHrs[c.id] != null) return state.customHrs[c.id];
  return c.hrs;
}

function calcGPA(courses) {
  let totalPts = 0, totalHrs = 0;
  courses.forEach(c => {
    const g = parseFloat(state.grades[c.id]);
    if (isNaN(g)) return;
    const h = getHrs(c);
    totalPts += g * h;
    totalHrs += h;
  });
  return totalHrs > 0 ? totalPts / totalHrs : 0;
}

function getGradeLabel(val) {
  if (!val || val==='W' || val==='IC') return val || '–';
  const g = parseFloat(val);
  if (g>=5.0) return 'A+';
  if (g>=4.75) return 'A';
  if (g>=4.5) return 'B+';
  if (g>=4.0) return 'B';
  if (g>=3.5) return 'C+';
  if (g>=3.0) return 'C';
  if (g>=2.5) return 'D+';
  if (g>=2.0) return 'D';
  return 'F';
}

function gradeClass(g) {
  if (g>=5.0) return 'cAp';
  if (g>=4.75) return 'cA';
  if (g>=4.5) return 'cBp';
  if (g>=4.0) return 'cB';
  if (g>=3.5) return 'cCp';
  if (g>=3.0) return 'cC';
  if (g>=2.5) return 'cDp';
  if (g>=2.0) return 'cD';
  return 'cF';
}

function getLetterGrade(gpa) {
  if (!gpa) return '–';
  if (gpa>=4.75) return 'ممتاز';
  if (gpa>=4.0) return 'جيد جداً';
  if (gpa>=3.0) return 'جيد';
  if (gpa>=2.0) return 'مقبول';
  return 'ضعيف';
}

function getAllCourses() {
  if (!currentSpec) return [];
  const result = [];
  currentSpec.levels.forEach(lv => {
    result.push(...lv.courses);
    if (customCourses[lv.level]) result.push(...customCourses[lv.level]);
  });
  return result;
}

function updateBanner() {
  const all = getAllCourses().filter(c => !state.deleted[c.id]);
  const done = all.filter(c => state.grades[c.id] && state.grades[c.id]!=='W' && state.grades[c.id]!=='IC');
  const totalHrs = all.reduce((s,c) => s+getHrs(c), 0);
  const doneHrs = done.reduce((s,c) => s+getHrs(c), 0);
  const gpa = calcGPA(done);

  document.getElementById('gpaMain').textContent = done.length ? gpa.toFixed(2) : '–';
  document.getElementById('gradeBadge').textContent = done.length ? getLetterGrade(gpa) : '–';
  document.getElementById('statHrs').textContent = doneHrs;
  document.getElementById('statCourses').textContent = done.length;
  const pct = totalHrs > 0 ? (doneHrs/totalHrs*100) : 0;
  document.getElementById('progressFill').style.width = pct.toFixed(1)+'%';
  document.getElementById('progressLabel').textContent = pct.toFixed(0)+'% من الخطة';
  document.getElementById('totalHrsLabel').textContent = totalHrs+' ساعة';
}

// ── PLAN RENDER ──────────────────────────────────────
function setFilter(f, btn) {
  planFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderPlan();
}

function renderPlan(search='') {
  const container = document.getElementById('planContainer');
  if (!currentSpec) return;
  let html = '';

  currentSpec.levels.forEach(lv => {
    const baseCourses = lv.courses;
    const extra = customCourses[lv.level] || [];
    const allCourses = [...baseCourses, ...extra];

    let filtered = allCourses;
    if (search) {
      const q = search.trim().toLowerCase();
      filtered = filtered.filter(c => c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q));
    }
    if (planFilter === 'done') filtered = filtered.filter(c => !state.deleted[c.id] && state.grades[c.id] && state.grades[c.id]!=='W' && state.grades[c.id]!=='IC');
    if (planFilter === 'pending') filtered = filtered.filter(c => !state.deleted[c.id] && !state.grades[c.id]);
    if (planFilter === 'deleted') filtered = filtered.filter(c => state.deleted[c.id]);
    else filtered = filtered.filter(c => planFilter==='done' || planFilter==='pending' ? true : !state.deleted[c.id] || planFilter==='all');

    // reapply for 'all'
    if (planFilter === 'all') {
      filtered = allCourses.filter(c => !search || c.name.toLowerCase().includes(search.trim().toLowerCase()) || c.code.toLowerCase().includes(search.trim().toLowerCase()));
    }

    if (!filtered.length) return;

    // level GPA
    const activeDone = allCourses.filter(c => !state.deleted[c.id] && state.grades[c.id] && state.grades[c.id]!=='W' && state.grades[c.id]!=='IC');
    const lvGpa = calcGPA(activeDone);
    const hasGrade = activeDone.length > 0;
    const doneCount = activeDone.length;
    const totalCount = allCourses.filter(c=>!state.deleted[c.id]).length;

    html += `<div class="level-block" id="lb_${lv.level}">
      <div class="level-header" onclick="toggleLevel(${lv.level})">
        <div class="level-title-left">
          <div class="level-num">${lv.level}</div>
          <div>
            <div class="level-name">المستوى ${lv.level}</div>
            <div class="level-meta">${doneCount}/${totalCount} مادة • ${allCourses.filter(c=>!state.deleted[c.id]).reduce((s,c)=>s+getHrs(c),0)} ساعة</div>
          </div>
        </div>
        <div class="level-right">
          <span class="level-gpa-mini ${hasGrade?'has-grade':''}" id="lvgpa_${lv.level}">${hasGrade?lvGpa.toFixed(2):'لم تبدأ'}</span>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="courses-grid">
        ${filtered.map(c => {
          if (state.deleted[c.id]) return deletedRow(c);
          return courseRow(c);
        }).join('')}
        <div class="add-course-row">
          <input type="text" class="add-input" id="add_name_${lv.level}" placeholder="اسم المادة الجديدة">
          <input type="text" class="add-input" id="add_code_${lv.level}" placeholder="الرمز" style="max-width:80px">
          <button class="btn-add" onclick="addCourse(${lv.level})">+ إضافة</button>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html || '<div class="empty-state"><span class="empty-icon">🔍</span>لا توجد نتائج</div>';
}

function toggleLevel(lvl) {
  const lb = document.getElementById('lb_'+lvl);
  if (lb) lb.classList.toggle('collapsed');
}

function courseRow(c) {
  const done = !!state.grades[c.id] && state.grades[c.id]!=='W' && state.grades[c.id]!=='IC';
  const h = getHrs(c);
  return `
    <div class="course-row ${done?'done':''}" id="row_${c.id}">
      <div class="course-info">
        <div class="course-name">${c.name}</div>
        <span class="course-code-badge">${c.code}</span>
      </div>
      <div style="text-align:center;flex-shrink:0">
        <input type="number" class="course-hrs-input" id="hrs_${c.id}" value="${h}" min="1" max="9" onchange="setHrs('${c.id}',this.value)" title="الساعات المعتمدة">
        <div class="hrs-label">ساعات</div>
      </div>
      <div class="course-right">
        ${gradeSelectHTML(c.id)}
        <button class="btn-del" onclick="deleteCourse('${c.id}')" title="حذف">✕</button>
      </div>
    </div>`;
}

function deletedRow(c) {
  return `
    <div class="course-row deleted-row" id="row_${c.id}">
      <div class="course-info">
        <div class="course-name" style="text-decoration:line-through;color:var(--text3)">${c.name}</div>
        <span class="course-code-badge">${c.code}</span>
      </div>
      <div class="course-right">
        <button class="btn-restore" onclick="restoreCourse('${c.id}')">↩ استعادة</button>
      </div>
    </div>`;
}

function gradeSelectHTML(id) {
  return `<select class="grade-select" id="sel_${id}" onchange="onGradeChange('${id}')">
    ${GRADE_OPTIONS.map(o=>`<option value="${o.val}" ${state.grades[id]===o.val?'selected':''}>${o.label}</option>`).join('')}
  </select>`;
}

function setHrs(id, val) {
  const v = parseInt(val);
  if (isNaN(v) || v < 1) return;
  if (!state.customHrs) state.customHrs = {};
  state.customHrs[id] = v;
  saveState();
  updateBanner();
  updateLevelGpa();
}

function onGradeChange(id) {
  const val = document.getElementById('sel_'+id)?.value;
  if (val === '') delete state.grades[id];
  else state.grades[id] = val;
  const row = document.getElementById('row_'+id);
  if (row) {
    const done = val && val!=='W' && val!=='IC';
    if (done) row.classList.add('done'); else row.classList.remove('done');
  }
  updateBanner();
  updateLevelGpa();
}

function updateLevelGpa() {
  if (!currentSpec) return;
  currentSpec.levels.forEach(lv => {
    const el = document.getElementById('lvgpa_'+lv.level);
    if (!el) return;
    const allC = [...lv.courses, ...(customCourses[lv.level]||[])];
    const done = allC.filter(c=>!state.deleted[c.id]&&state.grades[c.id]&&state.grades[c.id]!=='W'&&state.grades[c.id]!=='IC');
    if (done.length) {
      el.textContent = calcGPA(done).toFixed(2);
      el.classList.add('has-grade');
    } else {
      el.textContent = 'لم تبدأ';
      el.classList.remove('has-grade');
    }
  });
}

function deleteCourse(id) {
  state.deleted[id] = true;
  delete state.grades[id];
  saveState(); updateBanner(); renderPlan();
}

function restoreCourse(id) {
  delete state.deleted[id];
  saveState(); updateBanner(); renderPlan();
}

function addCourse(level) {
  const nameEl = document.getElementById('add_name_'+level);
  const codeEl = document.getElementById('add_code_'+level);
  const name = nameEl.value.trim();
  const code = codeEl.value.trim() || 'CUSTOM';
  if (!name) { showToast('أدخل اسم المادة أولاً'); return; }
  const id = 'custom_'+level+'_'+Date.now();
  if (!customCourses[level]) customCourses[level] = [];
  customCourses[level].push({ id, code, name, hrs:3 });
  localStorage.setItem('gpa_custom_'+currentSpec.id, JSON.stringify(customCourses));
  nameEl.value=''; codeEl.value='';
  renderPlan(); updateBanner();
  showToast('✅ تمت إضافة المادة');
}

function saveGrades() {
  const all = getAllCourses();
  all.forEach(c => {
    const sel = document.getElementById('sel_'+c.id);
    if (!sel) return;
    if (sel.value) state.grades[c.id] = sel.value;
    else delete state.grades[c.id];
    const hrsEl = document.getElementById('hrs_'+c.id);
    if (hrsEl) {
      const v = parseInt(hrsEl.value);
      if (!isNaN(v) && v>0) {
        if (!state.customHrs) state.customHrs = {};
        state.customHrs[c.id] = v;
      }
    }
  });
  saveState();
  updateBanner();
  showToast('💾 تم الحفظ بنجاح!');
}

// ── REPORT ────────────────────────────────────────────
function renderReport() {
  const container = document.getElementById('reportContainer');
  if (!currentSpec) return;
  const allDone = getAllCourses().filter(c=>!state.deleted[c.id]&&state.grades[c.id]&&state.grades[c.id]!=='W'&&state.grades[c.id]!=='IC');
  let html = '';

  currentSpec.levels.forEach(lv => {
    const allC = [...lv.courses,...(customCourses[lv.level]||[])];
    const done = allC.filter(c=>!state.deleted[c.id]&&state.grades[c.id]&&state.grades[c.id]!=='W'&&state.grades[c.id]!=='IC');
    if (!done.length) return;
    const lvGpa = calcGPA(done);
    const lvHrs = done.reduce((s,c)=>s+getHrs(c),0);
    const rows = done.map(c=>{
      const g = parseFloat(state.grades[c.id]);
      const lbl = getGradeLabel(state.grades[c.id]);
      return `<tr>
        <td>${c.name}<br><span style="font-size:.66rem;color:var(--text3)">${c.code}</span></td>
        <td style="text-align:center">${getHrs(c)}</td>
        <td style="text-align:center"><span class="chip ${gradeClass(g)}">${lbl}</span></td>
        <td style="text-align:center;font-size:.78rem;color:var(--text2)">${(g*getHrs(c)).toFixed(2)}</td>
      </tr>`;
    }).join('');
    html += `
      <div class="sem-card">
        <div class="sem-header">
          <div class="sem-title">المستوى ${lv.level}</div>
          <span class="sem-gpa-tag">GPA: ${lvGpa.toFixed(2)}</span>
        </div>
        <table class="t">
          <thead><tr><th>المادة</th><th style="text-align:center">ساعات</th><th style="text-align:center">الدرجة</th><th style="text-align:center">النقاط</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="margin-top:10px;font-size:.72rem;color:var(--text3)">
          ساعات المستوى: <strong style="color:var(--text)">${lvHrs}</strong> &nbsp;•&nbsp; معدل المستوى: <strong style="color:var(--accent)">${lvGpa.toFixed(2)}</strong> &nbsp;•&nbsp; ${getLetterGrade(lvGpa)}
        </div>
      </div>`;
  });

  if (!html) {
    container.innerHTML = '<div class="empty-state"><span class="empty-icon">☁️</span>لم تُدخل أي درجات بعد<br><small>أدخل درجاتك من تبويب خطة الدراسة</small></div>';
    return;
  }

  const cumGpa = calcGPA(allDone);
  const cumHrs = allDone.reduce((s,c)=>s+getHrs(c),0);
  const cumCard = `<div class="sem-card" style="background:linear-gradient(135deg,#0d1530,#120f2e);border-color:var(--border2);margin-bottom:18px">
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:2.6rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">${cumGpa.toFixed(2)}</div>
      <div style="font-size:.78rem;color:var(--text2);margin-top:6px">المعدل التراكمي الكلي</div>
      <div style="display:inline-block;margin-top:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-radius:8px;padding:4px 18px;font-size:.88rem;font-weight:700">${getLetterGrade(cumGpa)}</div>
      <div style="font-size:.72rem;color:var(--text3);margin-top:8px">${cumHrs} ساعة مكتملة</div>
    </div>
  </div>`;
  container.innerHTML = cumCard + html;
}

// ── TABS ──────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec_'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='report') renderReport();
}

// ── PERSIST ───────────────────────────────────────────
function saveState() {
  localStorage.setItem('gpa_state_v3', JSON.stringify(state));
}

function saveSettings() {
  localStorage.setItem('gpa_student_name', document.getElementById('studentName').value);
  localStorage.setItem('gpa_student_id', document.getElementById('studentId').value);
}

function resetAll() {
  if (confirm('هل أنت متأكد؟ سيتم مسح جميع الدرجات والتعديلات.')) {
    state = { grades:{}, deleted:{}, customHrs:{} };
    saveState();
    updateBanner();
    renderPlan();
    showToast('🗑 تم المسح');
  }
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
